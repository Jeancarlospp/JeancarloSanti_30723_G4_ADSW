<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AliGest - Portal de Expensas Residenciales</title>
    <!-- Outfit Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8fafc;
        }
        .glow-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.25;
            z-index: 0;
            pointer-events: none;
        }
        .login-card {
            background: #ffffff;
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 20px 40px -15px rgba(10, 74, 130, 0.1);
        }
        .input-premium {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            color: #0f172a;
            transition: all 0.3s ease;
        }
        .input-premium:focus {
            border-color: #3da046;
            box-shadow: 0 0 12px rgba(61, 160, 70, 0.2);
            background: #ffffff;
        }
        /* Custom logo buttons based on logo colors */
        .btn-logo {
            background: linear-gradient(135deg, #0a4a82 0%, #3da046 100%);
            transition: all 0.3s ease;
        }
        .btn-logo:hover {
            opacity: 0.95;
            transform: translateY(-1px);
        }
        .btn-logo:active {
            transform: translateY(0);
        }
        .text-logo-blue {
            color: #0a4a82;
        }
        .text-logo-green {
            color: #3da046;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-slate-800 overflow-x-hidden relative p-4 md:p-8">
    <!-- background glowing elements with logo colors -->
    <div class="glow-blob w-[500px] h-[500px] bg-blue-200/60 top-[-100px] right-[-100px]"></div>
    <div class="glow-blob w-[400px] h-[400px] bg-green-200/50 bottom-[-50px] left-[-100px]"></div>

    <!-- Centered Card Container -->
    <div class="relative z-10 w-full max-w-md">
        <div class="login-card w-full rounded-3xl p-8 md:p-10 relative overflow-hidden transition-all duration-300">
            <!-- Framed Logo at the top of the card -->
            <div class="flex justify-center mb-6">
                <img src="/imagenes/LOGO.png" alt="AliGest Logo" class="h-32 object-contain">
            </div>

            <div class="text-center mb-8">
                <h2 id="portalTitle" class="text-xl font-bold text-slate-800">Iniciar Sesión</h2>
                <p id="portalSub" class="text-slate-500 text-[10px] tracking-wider uppercase font-semibold">Portal de Expensas Residenciales</p>
            </div>

            <!-- FORMULARIO DE INICIO DE SESIÓN -->
            <div id="loginForm" class="space-y-5">
                <div class="space-y-1">
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-500">Nombre de Usuario</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400">
                            <svg class="w-4 h-4 text-logo-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        </span>
                        <input type="text" id="username" placeholder="Ej. casa14 o administrador" class="input-premium w-full rounded-xl pl-10 pr-4 py-3 text-xs focus:outline-none">
                    </div>
                </div>
                
                <div class="space-y-1">
                    <div class="flex justify-between items-center">
                        <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-500">Contraseña</label>
                    </div>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400">
                            <svg class="w-4 h-4 text-logo-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        </span>
                        <input type="password" id="password" placeholder="••••••••" class="input-premium w-full rounded-xl pl-10 pr-4 py-3 text-xs focus:outline-none">
                    </div>
                </div>

                <button type="button" onclick="ejecutarLogin()" class="w-full btn-logo text-white font-bold py-3.5 rounded-xl transition duration-300 shadow-md cursor-pointer text-xs uppercase tracking-wider">
                    Ingresar al Portal
                </button>

                <div class="flex justify-center items-center text-xs mt-6 border-t border-slate-200 pt-4">
                    <a href="#" onclick="toggleForm('recovery')" class="text-logo-blue hover:text-blue-800 transition font-medium">¿Olvidaste tu contraseña?</a>
                </div>
                <div id="errorMsg" class="hidden bg-rose-50 border border-rose-200 text-rose-600 text-xs p-3.5 rounded-xl text-center font-medium"></div>
            </div>

            <!-- FORMULARIO DE RECUPERACIÓN (SOLICITAR CÓDIGO POR EMAIL) -->
            <div id="recoveryForm" class="hidden space-y-5">
                <div class="space-y-1">
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-500">Correo Electrónico Registrado</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400">
                            <svg class="w-4 h-4 text-logo-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                        </span>
                        <input type="email" id="recEmail" placeholder="usuario@gmail.com" class="input-premium w-full rounded-xl pl-10 pr-4 py-3 text-xs focus:outline-none">
                    </div>
                </div>
                
                <button type="button" onclick="solicitarCodigoRecuperacion()" class="w-full btn-logo text-white font-bold py-3.5 rounded-xl transition duration-300 shadow-md cursor-pointer text-xs uppercase tracking-wider">
                    Enviar Código de Recuperación
                </button>
                
                <p class="text-center text-xs text-slate-400 mt-6 border-t border-slate-200 pt-4">
                    <a href="#" onclick="toggleForm('login')" class="text-logo-blue hover:text-blue-800 transition font-semibold">Volver al Inicio de Sesión</a>
                </p>
                <div id="recSuccessMsg" class="hidden bg-emerald-50 border border-emerald-200 text-emerald-600 text-xs p-3.5 rounded-xl text-center font-medium"></div>
                <div id="recErrorMsg" class="hidden bg-rose-50 border border-rose-200 text-rose-600 text-xs p-3.5 rounded-xl text-center font-medium"></div>
            </div>

            <!-- FORMULARIO DE RESTABLECIMIENTO (CONFIRMAR CÓDIGO) -->
            <div id="recoveryConfirmForm" class="hidden space-y-5">
                <div class="bg-blue-50 border border-blue-200 text-blue-700 text-[11px] p-3.5 rounded-xl leading-relaxed">
                    Código enviado. Por favor, revise la consola del servidor de Node.js para copiar el código simulado.
                </div>
                
                <div class="space-y-1">
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-500">Confirmar Usuario</label>
                    <input type="text" id="recUsername" placeholder="nombre_usuario" class="input-premium w-full rounded-xl px-4 py-3 text-xs focus:outline-none">
                </div>
                
                <div class="space-y-1">
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-500">Código de 6 Dígitos</label>
                    <input type="text" id="recCodigo" placeholder="123456" class="input-premium w-full rounded-xl px-4 py-3 text-xs focus:outline-none">
                </div>
                
                <div class="space-y-1">
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-500">Nueva Contraseña</label>
                    <input type="password" id="recPassword" placeholder="••••••••" class="input-premium w-full rounded-xl px-4 py-3 text-xs focus:outline-none">
                </div>
                
                <button type="button" onclick="restablecerContrasena()" class="w-full btn-logo text-white font-bold py-3.5 rounded-xl transition duration-300 shadow-md cursor-pointer text-xs uppercase tracking-wider">
                    Confirmar y Cambiar Clave
                </button>
                
                <p class="text-center text-xs text-slate-400 mt-6 border-t border-slate-200 pt-4">
                    <a href="#" onclick="toggleForm('login')" class="text-logo-blue hover:text-blue-800 transition font-semibold">Cancelar y Volver</a>
                </p>
                <div id="recConfSuccessMsg" class="hidden bg-emerald-50 border border-emerald-200 text-emerald-600 text-xs p-3.5 rounded-xl text-center font-medium"></div>
                <div id="recConfErrorMsg" class="hidden bg-rose-50 border border-rose-200 text-rose-600 text-xs p-3.5 rounded-xl text-center font-medium"></div>
            </div>

        </div>
    </div>

    <script>
        function toggleForm(formType) {
            // Ocultar todos
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('recoveryForm').classList.add('hidden');
            document.getElementById('recoveryConfirmForm').classList.add('hidden');

            // Resetear textos
            document.getElementById('portalTitle').innerText = 'Iniciar Sesión';
            document.getElementById('portalSub').innerText = 'Portal de Expensas Residenciales';

            // Ocultar alertas
            document.getElementById('errorMsg').classList.add('hidden');
            document.getElementById('recSuccessMsg').classList.add('hidden');
            document.getElementById('recErrorMsg').classList.add('hidden');
            document.getElementById('recConfSuccessMsg').classList.add('hidden');
            document.getElementById('recConfErrorMsg').classList.add('hidden');

            if (formType === 'login') {
                document.getElementById('loginForm').classList.remove('hidden');
            } else if (formType === 'recovery') {
                document.getElementById('recoveryForm').classList.remove('hidden');
                document.getElementById('portalTitle').innerText = 'Restablecer Clave';
                document.getElementById('portalSub').innerText = 'Recuperación de Acceso';
            }
        }

        async function ejecutarLogin() {
            const eMsg = document.getElementById('errorMsg');
            eMsg.classList.add('hidden');
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value;

            if (!u || !p) {
                eMsg.innerText = "Por favor, complete todos los campos.";
                eMsg.classList.remove('hidden');
                return;
            }

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await response.json();
                if (response.ok) {
                    // Guardar datos en localstorage para control de sesión
                    localStorage.setItem('userRole', data.session.role);
                    localStorage.setItem('userId', data.session.id);
                    localStorage.setItem('username', data.session.username);
                    localStorage.setItem('userEmail', data.session.email);
                    localStorage.setItem('mustChangePassword', data.session.mustChangePassword ? 'true' : 'false');
                    
                    window.location.href = '/dashboard';
                } else {
                    eMsg.innerText = data.error || 'Error al iniciar sesión.';
                    eMsg.classList.remove('hidden');
                }
            } catch {
                eMsg.innerText = "Error en la comunicación con el servidor.";
                eMsg.classList.remove('hidden');
            }
        }

        async function solicitarCodigoRecuperacion() {
            const sMsg = document.getElementById('recSuccessMsg');
            const eMsg = document.getElementById('recErrorMsg');
            sMsg.classList.add('hidden'); eMsg.classList.add('hidden');

            const email = document.getElementById('recEmail').value.trim();
            if (!email) {
                eMsg.innerText = "El correo electrónico es obligatorio.";
                eMsg.classList.remove('hidden');
                return;
            }

            try {
                const response = await fetch('/api/auth/recuperar-codigo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await response.json();
                if (response.ok) {
                    sMsg.innerHTML = `Código generado con éxito: <br><b class="text-sm tracking-widest text-slate-800 font-mono">${data.codigoSimulado}</b>`;
                    sMsg.classList.remove('hidden');
                    // Pasar al siguiente formulario
                    setTimeout(() => {
                        document.getElementById('recoveryForm').classList.add('hidden');
                        document.getElementById('recoveryConfirmForm').classList.remove('hidden');
                        document.getElementById('recUsername').value = data.username || '';
                    }, 2200);
                } else {
                    eMsg.innerText = data.error || 'Error al solicitar código.';
                    eMsg.classList.remove('hidden');
                }
            } catch {
                eMsg.innerText = "Error en la comunicación.";
                eMsg.classList.remove('hidden');
            }
        }

        async function restablecerContrasena() {
            const sMsg = document.getElementById('recConfSuccessMsg');
            const eMsg = document.getElementById('recConfErrorMsg');
            sMsg.classList.add('hidden'); eMsg.classList.add('hidden');

            const u = document.getElementById('recUsername').value.trim();
            const c = document.getElementById('recCodigo').value.trim();
            const p = document.getElementById('recPassword').value;

            if (!u || !c || !p) {
                eMsg.innerText = "Por favor, complete todos los campos.";
                eMsg.classList.remove('hidden');
                return;
            }

            try {
                const response = await fetch('/api/auth/recuperar-confirmar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, codigo: c, nuevaContrasena: p })
                });
                const data = await response.json();
                if (response.ok) {
                    sMsg.innerText = "¡Contraseña restablecida! Redirigiendo...";
                    sMsg.classList.remove('hidden');
                    setTimeout(() => { toggleForm('login'); }, 1500);
                } else {
                    eMsg.innerText = data.error || 'Error al restablecer contraseña.';
                    eMsg.classList.remove('hidden');
                }
            } catch {
                eMsg.innerText = "Error en la comunicación.";
                eMsg.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
